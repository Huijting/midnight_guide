name: Fetch Prey today (EU)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

on:
  schedule:
    # Na EU-ochtend: 07:15 UTC (08:15 CET) — kort na Bountiful-run; Wowhead TIW is dan bijgewerkt
    - cron: '15 7 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      BRANCH: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync latest default branch
        run: |
          set -euo pipefail
          B="${BRANCH:-${GITHUB_REF_NAME:-main}}"
          git fetch origin "$B" --prune
          git checkout "$B"
          git pull --ff-only origin "$B" || git pull --rebase origin "$B"

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Update prey-today.json
        run: node scripts/fetch-prey-today.js

      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          B="${BRANCH:-${GITHUB_REF_NAME:-main}}"
          git add data/prey-today.json
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: update EU prey-today.json (Wowhead or computed)"
          # Andere workflow (b.v. Bountiful) kan intussen main hebben gepusht — rebase vóór push
          for i in 1 2 3 4 5; do
            git pull --rebase origin "$B"
            if git push origin "$B"; then
              exit 0
            fi
            echo "Push rejected (race), retry $i/5 ..."
            sleep $((i * 2))
          done
          exit 1
