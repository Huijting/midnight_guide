# CI v3 — sync → node → pull/rebase → commit → push in één script (geen push zonder rebase).
# (Oude setups gebruikten checkout@v4 zonder rebase; dit bestand gebruikt bewust checkout@v6 + ci-regenerate-json-push.sh.)
name: Fetch Prey today (EU)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

on:
  schedule:
    - cron: '15 7 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Sync, regenerate prey-today.json, commit, push
        run: |
          bash scripts/ci-regenerate-json-push.sh \
            data/prey-today.json \
            "chore: update EU prey-today.json (Wowhead or computed)" \
            scripts/fetch-prey-today.js
