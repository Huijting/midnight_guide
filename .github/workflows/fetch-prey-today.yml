name: Fetch Prey today (EU)

permissions:
  contents: write

on:
  schedule:
    # Na EU-ochtend: 07:15 UTC (08:15 CET) — kort na Bountiful-run; Wowhead TIW is dan bijgewerkt
    - cron: '15 7 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Update prey-today.json
        run: node scripts/fetch-prey-today.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prey-today.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update EU prey-today.json (Wowhead or computed)"
            git push
          fi
