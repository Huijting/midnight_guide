# EU daily data: prey-today.json + bountiful-today.json + live_reset_data.json (Python Wowhead scraper) → one commit/push.
# Schedule matches the old Bountiful workflow (retries when Wowhead TIW is slow); Prey fetcher skips write when unchanged.
# Bountiful: EU-only Wowhead JSON by default (see scripts/fetch-bountiful-delves.js). live_reset: scripts/wowhead_live_reset_scraper.py (BeautifulSoup).
name: Fetch EU daily JSON (Prey + Bountiful)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

on:
  schedule:
    - cron: '5 7 * * *'
    - cron: '15 7 * * *'
    - cron: '25 7 * * *'
    - cron: '45 7 * * *'
    - cron: '10 8 * * *'
  workflow_dispatch:

concurrency:
  group: fetch-eu-daily-json
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Sync, regenerate prey + bountiful JSON, commit, push
        run: bash scripts/ci-regenerate-prey-and-bountiful-push.sh
