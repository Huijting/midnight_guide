# CI v3 — zelfde push-pad als prey (scripts/ci-regenerate-json-push.sh).
name: Fetch Bountiful Delves

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

on:
  schedule:
    - cron: '5 7 * * *'
    - cron: '25 7 * * *'
    - cron: '45 7 * * *'
    - cron: '10 8 * * *'
  workflow_dispatch:

concurrency:
  group: fetch-bountiful-delves
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Sync, regenerate bountiful-today.json, commit, push
        run: |
          bash scripts/ci-regenerate-json-push.sh \
            data/bountiful-today.json \
            "chore: update EU Bountiful Delves from Wowhead TIW" \
            scripts/fetch-bountiful-delves.js
