name: Fetch Bountiful Delves

permissions:
  contents: write

on:
  schedule:
    # EU Bountiful roteert om 07:00 UTC. GitHub kan `schedule` 15–60+ min uitstellen — meerdere slots
    # vergroten de kans dat er vóór 09:00 UTC een succesvolle commit staat.
    - cron: '5 7 * * *'
    - cron: '25 7 * * *'
    - cron: '45 7 * * *'
    - cron: '10 8 * * *'
  workflow_dispatch: # Handmatig triggeren mogelijk

concurrency:
  group: fetch-bountiful-delves
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      # v6+ draait op runner-Node 24 — vermijdt Node-20-deprecation op oudere checkout/setup-node
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Fetch from Wowhead
        run: node scripts/fetch-bountiful-delves.js

      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="${{ github.ref_name }}"
          git add data/bountiful-today.json
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: update EU Bountiful Delves from Wowhead TIW"
          for i in 1 2 3 4 5; do
            git pull --rebase origin "$BRANCH"
            if git push origin "$BRANCH"; then
              exit 0
            fi
            echo "Push rejected (race), retry $i/5 ..."
            sleep $((i * 2))
          done
          exit 1
