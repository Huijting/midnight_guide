name: Fetch Bountiful Delves

permissions:
  contents: write

on:
  schedule:
    # EU Bountiful roteert om 07:00 UTC. GitHub kan `schedule` 15–60+ min uitstellen — meerdere slots
    # vergroten de kans dat er vóór 09:00 UTC een succesvolle commit staat.
    - cron: '5 7 * * *'
    - cron: '25 7 * * *'
    - cron: '45 7 * * *'
    - cron: '10 8 * * *'
  workflow_dispatch: # Handmatig triggeren mogelijk

concurrency:
  group: fetch-bountiful-delves
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch from Wowhead
        run: node scripts/fetch-bountiful-delves.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/bountiful-today.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update EU Bountiful Delves from Wowhead TIW"
            git push
          fi
