name: Build MidnightGuide addon zip

on:
  workflow_dispatch:
  push:
    tags:
      - "addon-v*"

permissions:
  contents: write

jobs:
  build-addon:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read addon version from TOC
        id: version
        run: |
          VERSION_LINE=$(sed -n 's/^## Version:[[:space:]]*//p' addon/MidnightGuide/MidnightGuide.toc | head -n 1)
          if [ -z "$VERSION_LINE" ]; then
            echo "Failed to read version from addon/MidnightGuide/MidnightGuide.toc"
            exit 1
          fi
          echo "value=$VERSION_LINE" >> "$GITHUB_OUTPUT"

      - name: Build zip archive
        run: |
          mkdir -p dist
          cd addon
          zip -r "../dist/MidnightGuide-${{ steps.version.outputs.value }}.zip" MidnightGuide

      - name: Upload zip as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: MidnightGuide-${{ steps.version.outputs.value }}
          path: dist/MidnightGuide-${{ steps.version.outputs.value }}.zip
          if-no-files-found: error

      - name: Create GitHub Release for addon tag
        if: startsWith(github.ref, 'refs/tags/addon-v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MidnightGuide-${{ steps.version.outputs.value }}.zip
          generate_release_notes: true
